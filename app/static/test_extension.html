<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquera Extension Test Page</title>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 50px; background: #f9fafb; color: #111827; }
        .hero { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #111827; }
        p { font-size: 1.125rem; line-height: 1.75; color: #4b5563; }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: #10b981; color: white; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .version-badge { position: fixed; bottom: 10px; left: 10px; font-size: 0.75rem; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="hero" data-integration-id="cloud_sync_pro" data-app-version="2.5.Ultra">
        <h1>Cloud Integration Dashboard</h1>
        <p>This page is used for verifying the Aquera AI Extension SOTA features.</p>
        
        <div class="btn-group">
            <button class="btn btn-primary" id="sync-now">Sync Integration</button>
            <button class="btn btn-secondary" id="open-docs">View Documentation</button>
        </div>
    </div>

    <div class="version-badge">Aquera v2.5.Ultra</div>

    <!-- Inject the real widget script -->
    <script src="http://localhost:8000/widget/widget.js" data-api-url="http://localhost:8000"></script>
</body>
</html>
