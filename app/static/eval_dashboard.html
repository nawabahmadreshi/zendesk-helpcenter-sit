<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOTA Board | AI Copilot Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .stat-card .trend {
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .trend.up { color: var(--success); }
        .trend.down { color: var(--accent); }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .chart-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-card h2 {
            margin: 0 0 20px 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        .status-pill {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

    </style>
</head>
<body>

    <header>
        <div>
            <h1>SOTA BOARD</h1>
            <p style="color: var(--text-dim); margin-top: 5px;">Production RAG Evaluation Dashboard</p>
        </div>
        <div class="status-pill">AGENTIC SYSTEM: ONLINE</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Avg Latency</h3>
            <div class="value" id="avg-latency">-- ms</div>
        </div>
        <div class="stat-card">
            <h3>Faithfulness</h3>
            <div class="value" id="avg-faithfulness">--%</div>
        </div>
        <div class="stat-card">
            <h3>Answer Relevance</h3>
            <div class="value" id="avg-relevance">--%</div>
        </div>
        <div class="stat-card">
            <h3>Feedback Score</h3>
            <div class="value" id="feedback-score" style="display: flex; gap: 10px;">
                <span style="color: var(--success);" id="tup-count">0</span>
                <span style="color: var(--accent);" id="tdown-count">0</span>
            </div>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-card">
            <h2>Latency Distribution</h2>
            <canvas id="latencyChart"></canvas>
        </div>
        <div class="chart-card">
            <h2>CRAG Pipeline Status</h2>
            <canvas id="cragChart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Retrieval Methods</h2>
            <canvas id="retrievalChart"></canvas>
        </div>
        <div class="chart-card">
            <h2>Intent Classification</h2>
            <canvas id="intentChart"></canvas>
        </div>
    </div>

    <div style="margin-top: 40px; width: 100%; max-width: 1200px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; gap: 30px;" id="system-health">
        <div>Health: <span id="health-status">Checking...</span></div>
        <div>Sync: <span id="sync-status">--</span></div>
        <div>VectorDB: <span id="vdb-status">--</span></div>
        <div>Torch: <span id="torch-status">--</span></div>
    </div>

    <script>
        let charts = {};

        async function updateStats() {
            try {
                const res = await fetch('/api/eval/stats');
                const data = await res.json();

                document.getElementById('avg-latency').innerText = `${Math.round(data.avg_latency)} ms`;
                document.getElementById('avg-faithfulness').innerText = `${Math.round(data.avg_faithfulness * 100)}%`;
                document.getElementById('avg-relevance').innerText = `${Math.round(data.avg_relevance * 100)}%`;
                document.getElementById('tup-count').innerText = `+${data.thumbs_up}`;
                document.getElementById('tdown-count').innerText = `-${data.thumbs_down}`;

                // Health
                const h = data.health;
                document.getElementById('health-status').innerText = 'ONLINE';
                document.getElementById('sync-status').innerText = h.sync_enabled ? 'ENABLED' : 'DISABLED';
                document.getElementById('vdb-status').innerText = h.vector_db_ready ? 'READY' : 'MISSING';
                document.getElementById('torch-status').innerText = h.torch_available ? 'OK' : 'DEGRADED';

                // Update Charts
                updateChart('latencyChart', 'line', {
                    labels: data.latency_timeline.map(t => t.time),
                    datasets: [{
                        label: 'Latency',
                        data: data.latency_timeline.map(t => t.p50),
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                });

                updateChart('cragChart', 'bar', {
                    labels: Object.keys(data.crag_distribution),
                    datasets: [{
                        data: Object.values(data.crag_distribution),
                        backgroundColor: ['#22c55e', '#38bdf8', '#f59e0b', '#ef4444']
                    }]
                });

                updateChart('retrievalChart', 'doughnut', {
                    labels: Object.keys(data.retrieval_methods),
                    datasets: [{
                        data: Object.values(data.retrieval_methods),
                        backgroundColor: ['#818cf8', '#f472b6', '#38bdf8']
                    }]
                });

                updateChart('intentChart', 'doughnut', {
                    labels: Object.keys(data.intents),
                    datasets: [{
                        data: Object.values(data.intents),
                        backgroundColor: ['#38bdf8', '#818cf8', '#f472b6', '#22c55e', '#f59e0b'],
                        borderWidth: 0
                    }]
                });

            } catch (err) {
                console.error("Failed to fetch stats:", err);
            }
        }

        function updateChart(id, type, data) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: type,
                data: data,
                options: {
                    responsive: true,
                    plugins: { legend: { display: type === 'doughnut', position: 'bottom', labels: { color: '#94a3b8' } } },
                    scales: type !== 'doughnut' ? {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    } : {}
                }
            });
        }

        updateStats();
        setInterval(updateStats, 30000); // Polling every 30s
    </script>
</body>
</html>
