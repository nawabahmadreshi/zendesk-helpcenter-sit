<!DOCTYPE html>
<html>

<head>
    <title>Aquera AI Help Extension Options</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #4f46e5;
        }

        #status {
            margin-top: 10px;
            color: #10b981;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h2>AI Widget Settings</h2>
    <div class="form-group">
        <label for="apiUrl">Backend API URL</label>
        <input type="text" id="apiUrl" placeholder="http://localhost:8000">
        <small style="color: #666; display: block; margin-top: 4px;">The URL where the AI widget server is
            running.</small>
    </div>
    <button id="save">Save Settings</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>

</html>
