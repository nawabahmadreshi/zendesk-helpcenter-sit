    <h1>Greenhouse Recruiting Version History</h1>
    <p><a href="../index.html">← Back</a></p>
    <p>The following are the changes for different versions of the Greenhouse Recruiting connector:</p><!--Note--><div>
<div>
<em> </em> <!-- Font Awesome icon as a note icon -->
</div>
<div>
<p><strong>NOTE</strong>: This guide is for INTERNAL REFERENCE only and must not be circulated to customers.</p>
</div>
</div><h1>v9</h1><figure><table>
<colgroup>
<col/>
<col/>
</colgroup>
<tbody>
<tr>
<td><p><strong>Summary of Changes</strong></p></td>
<td><p><strong>Release Date</strong></p></td>
</tr>
<tr>
<td><p>The connector now supports filtering users by <em>meta.lastModified and meta.created.</em></p></td>
<td><p>February 10, 2026</p></td>
</tr>
<tr>
<td><p>The user's emails[].value and <em>emails[].primary</em> attributes are no longer mandatory.</p></td>
<td><p> </p></td>
</tr>
<tr>
<td><p>The primary email address of a user with <em>recruiter</em> type can now be updated.</p></td>
<td><p> </p></td>
</tr>
<tr>
<td><p>The connector now supports OpenAPI operations to import all candidates and import a candidate by ID.</p></td>
<td><p> </p></td>
</tr>
<tr>
<td><p>Three new Open API operation IDs, <strong>updateJobTitle</strong>, <strong>updateRawUser</strong>, <strong>getRawUserById</strong>, and <strong>getAllRawUsers</strong> are introduced.</p></td>
<td><p> </p></td>
</tr>
<tr>
<td><p>A new tenant attribute, <strong>Update Recruiter Job Title</strong> is introduced.</p></td>
<td><p> </p></td>
</tr>
<tr>
<td><p>The <strong>Greenhouse Recruiting Login Email</strong> and <strong>Greenhouse Recruiting Login Password</strong> tenant attributes have been renamed to <strong>Username or Email</strong> and <strong>Login Password</strong><span>, respectively.</span></p></td>
<td><p> </p></td>
</tr>
</tbody>
</table></figure><h1>V8</h1><figure><table>

<td><p><strong>Release Date</strong></p></td>
</tr>
<tr>
<td><p>The connector previously returned specific Personally Identifiable Information (PII) attributes in its response. Now, the connector will only return PII attributes specified in the Tenant Attribute <strong>PII attributes that need to be retrieved</strong>.</p></td>
<td><p> </p></td>
</tr>
</tbody>
